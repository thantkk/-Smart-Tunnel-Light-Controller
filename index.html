<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tunnel Light Controller</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;600;800&display=swap');

  :root {
    --bg:       #070c18;
    --surface:  #0d1526;
    --card:     #111e35;
    --border:   #1a2d4a;
    --accent:   #00d4ff;
    --accent2:  #0050ff;
    --warn:     #ff3860;
    --text:     #c8dff5;
    --dim:      #4a6280;
    --on-glow:  0 0 24px #00d4ff66, 0 0 6px #00d4ffaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, #00307830 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, #0d1f3520 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #0d1f3520 40px);
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  .badge {
    display: inline-block;
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--accent);
    border: 1px solid #00d4ff44;
    border-radius: 4px;
    padding: 3px 10px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  h1 {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 800;
    letter-spacing: .05em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ffffff 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }
  .subtitle {
    font-size: .78rem;
    color: var(--dim);
    margin-top: 6px;
    letter-spacing: .08em;
  }

  /* ── LED Cards ── */
  .tunnel-row {
    display: flex;
    align-items: flex-end;
    gap: 0;
    margin-bottom: 28px;
    position: relative;
  }
  .tunnel-road {
    width: 340px;
    height: 14px;
    background: linear-gradient(90deg, #0d1526, #1a2d4a 10%, #1a2d4a 90%, #0d1526);
    border-radius: 2px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 30px;
  }
  .tunnel-road::after {
    content: '';
    position: absolute;
    inset: 5px 10%;
    border-top: 2px dashed #ffffff18;
  }

  .led-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }

  .led-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 14px 18px;
    text-align: center;
    transition: border-color .35s, box-shadow .35s;
    position: relative;
    overflow: hidden;
  }
  .led-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0;
    transition: opacity .4s;
  }
  .led-card.on {
    border-color: var(--accent);
    box-shadow: var(--on-glow);
  }
  .led-card.on::before { opacity: 1; }

  .bulb {
    width: 40px; height: 40px;
    border-radius: 50%;
    margin: 0 auto 14px;
    background: var(--border);
    transition: background .4s, box-shadow .4s;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .bulb svg { width: 20px; height: 20px; fill: var(--dim); transition: fill .4s; }
  .led-card.on .bulb {
    background: var(--accent);
    box-shadow: 0 0 20px var(--accent), 0 0 40px #00d4ff44;
  }
  .led-card.on .bulb svg { fill: #fff; }

  .led-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem;
    letter-spacing: .12em;
    color: var(--dim);
    margin-bottom: 14px;
    text-transform: uppercase;
  }

  .btn-pair {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .btn {
    border: none;
    border-radius: 8px;
    padding: 8px 6px;
    font-family: 'Exo 2', sans-serif;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .07em;
    cursor: pointer;
    transition: opacity .18s, transform .12s;
    text-transform: uppercase;
  }
  .btn:active { transform: scale(.96); }
  .btn-on-small  { background: var(--accent); color: #07121e; }
  .btn-off-small { background: #1a2d4a; color: var(--dim); }
  .btn-on-small:hover  { opacity: .85; }
  .btn-off-small:hover { background: #223550; color: var(--text); }

  /* ── Group Controls ── */
  .group-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 14px;
  }

  .big-btn {
    padding: 16px 10px;
    border-radius: 14px;
    font-family: 'Exo 2', sans-serif;
    font-size: .88rem;
    font-weight: 700;
    letter-spacing: .08em;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity .18s, transform .12s;
  }
  .big-btn:active { transform: scale(.97); }
  .btn-all-on  { background: var(--accent); color: #07121e; }
  .btn-all-off { background: #1a2d4a; color: var(--text); }
  .btn-seq  { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: #fff; }
  .btn-stop { background: var(--warn); color: #fff; }
  .btn-all-on:hover, .btn-seq:hover, .btn-stop:hover { opacity: .88; }

  /* ── Settings Panel ── */
  .settings {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 22px 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 20px;
  }
  .settings-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: .68rem;
    letter-spacing: .14em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .settings-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .setting-row {
    margin-bottom: 16px;
  }
  .setting-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: .78rem;
  }
  .setting-label span:first-child { color: var(--text); }
  .setting-value {
    font-family: 'Share Tech Mono', monospace;
    color: var(--accent);
    font-size: .8rem;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 8px var(--accent);
  }

  /* ── Status bar ── */
  .status-bar {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .status-item {
    font-family: 'Share Tech Mono', monospace;
    font-size: .68rem;
    color: var(--dim);
  }
  .status-item span { color: var(--accent); }
  .dot-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 6px #00ff88;
    display: inline-block;
    margin-right: 4px;
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Sequential animation ── */
  @keyframes pulse {
    0%  { box-shadow: 0 0 6px var(--accent); }
    50% { box-shadow: var(--on-glow); }
    100%{ box-shadow: 0 0 6px var(--accent); }
  }
  .led-card.on.seq-active { animation: pulse 0.8s ease-in-out; }
</style>
</head>
<body>

<header>
  <div class="badge">ESP32 · IoT · Wi-Fi</div>
  <h1>Tunnel Light<br>Controller</h1>
  <p class="subtitle">West Yangon Technological University &nbsp;·&nbsp; II B.E. EC &nbsp;·&nbsp; 2024</p>
</header>

<!-- Individual LED Cards -->
<div class="led-grid" id="ledGrid">
  <div class="led-card" id="card1">
    <div class="bulb">
      <svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a7 7 0 0 1 4 12.7V17H8v-1.3A7 7 0 0 1 12 3z"/></svg>
    </div>
    <div class="led-name">LED 1</div>
    <div class="btn-pair">
      <button class="btn btn-on-small"  onclick="ledOn(1)">ON</button>
      <button class="btn btn-off-small" onclick="ledOff(1)">OFF</button>
    </div>
  </div>
  <div class="led-card" id="card2">
    <div class="bulb">
      <svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a7 7 0 0 1 4 12.7V17H8v-1.3A7 7 0 0 1 12 3z"/></svg>
    </div>
    <div class="led-name">LED 2</div>
    <div class="btn-pair">
      <button class="btn btn-on-small"  onclick="ledOn(2)">ON</button>
      <button class="btn btn-off-small" onclick="ledOff(2)">OFF</button>
    </div>
  </div>
  <div class="led-card" id="card3">
    <div class="bulb">
      <svg viewBox="0 0 24 24"><path d="M9 21h6M12 3a7 7 0 0 1 4 12.7V17H8v-1.3A7 7 0 0 1 12 3z"/></svg>
    </div>
    <div class="led-name">LED 3</div>
    <div class="btn-pair">
      <button class="btn btn-on-small"  onclick="ledOn(3)">ON</button>
      <button class="btn btn-off-small" onclick="ledOff(3)">OFF</button>
    </div>
  </div>
</div>

<!-- Group Controls -->
<div class="group-controls">
  <button class="big-btn btn-all-on"  onclick="allOn()">⚡ All ON</button>
  <button class="big-btn btn-all-off" onclick="allOff()">◼ All OFF</button>
  <button class="big-btn btn-seq"     onclick="startSeq()">▶ Sequential</button>
  <button class="big-btn btn-stop"    onclick="stopSeq()">■ Stop</button>
</div>

<!-- Settings -->
<div class="settings">
  <div class="settings-title">Settings</div>
  <div class="setting-row">
    <div class="setting-label">
      <span>Auto-off Timer</span>
      <span class="setting-value" id="timerVal">5.0 s</span>
    </div>
    <input type="range" id="timerSlider" min="1000" max="30000" step="500" value="5000"
           oninput="updateTimer(this.value)">
  </div>
  <div class="setting-row">
    <div class="setting-label">
      <span>Sequential Delay</span>
      <span class="setting-value" id="seqVal">0.8 s</span>
    </div>
    <input type="range" id="seqSlider" min="200" max="3000" step="100" value="800"
           oninput="updateSeqDelay(this.value)">
  </div>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <span class="status-item"><span class="dot-live"></span>LIVE</span>
  <span class="status-item">AUTO-OFF: <span id="sb-timer">5.0s</span></span>
  <span class="status-item">SEQ DELAY: <span id="sb-seq">0.8s</span></span>
  <span class="status-item">MODE: <span id="sb-mode">MANUAL</span></span>
</div>

<script>
/* ── Local simulation (when not connected to ESP32) ── */
const state = { leds: [false, false, false], seq: false, timer: 5000, seqDelay: 800 };
let seqInterval = null;
let autoOffTimers = [null, null, null];

function setCard(i, on) {
  state.leds[i] = on;
  document.getElementById('card' + (i+1)).classList.toggle('on', on);
}

function clearAutoOff(i) {
  if (autoOffTimers[i]) { clearTimeout(autoOffTimers[i]); autoOffTimers[i] = null; }
}

function scheduleAutoOff(i) {
  clearAutoOff(i);
  autoOffTimers[i] = setTimeout(() => { if (!state.seq) setCard(i, false); }, state.timer);
}

function ledOn(n)  { stopSeq(); setCard(n-1, true);  scheduleAutoOff(n-1); updateStatus(); }
function ledOff(n) { clearAutoOff(n-1); setCard(n-1, false); updateStatus(); }

function allOn()  { stopSeq(); [0,1,2].forEach(i => { clearAutoOff(i); setCard(i, true); scheduleAutoOff(i); }); updateStatus(); }
function allOff() { stopSeq(); [0,1,2].forEach(i => { clearAutoOff(i); setCard(i, false); }); updateStatus(); }

function startSeq() {
  stopSeq();
  state.seq = true;
  let idx = 0;
  seqInterval = setInterval(() => {
    [0,1,2].forEach(i => setCard(i, false));
    setCard(idx, true);
    idx = (idx + 1) % 3;
    updateStatus();
  }, state.seqDelay);
  updateStatus();
}

function stopSeq() {
  if (seqInterval) { clearInterval(seqInterval); seqInterval = null; }
  state.seq = false;
  [0,1,2].forEach(i => setCard(i, false));
  updateStatus();
}

function updateTimer(v) {
  state.timer = parseInt(v);
  document.getElementById('timerVal').textContent = (v/1000).toFixed(1) + ' s';
  document.getElementById('sb-timer').textContent = (v/1000).toFixed(1) + 's';
}

function updateSeqDelay(v) {
  state.seqDelay = parseInt(v);
  document.getElementById('seqVal').textContent = (v/1000).toFixed(1) + ' s';
  document.getElementById('sb-seq').textContent = (v/1000).toFixed(1) + 's';
  if (state.seq) startSeq(); // restart with new delay
}

function updateStatus() {
  document.getElementById('sb-mode').textContent = state.seq ? 'SEQUENTIAL' : 'MANUAL';
}

/* ── If served from ESP32, swap to real fetch calls ──
   Uncomment the block below and delete the simulation above.

function cmd(url) { fetch(url).then(() => poll()); }
function ledOn(n)  { cmd('/toggle?led='+n); }
function ledOff(n) { cmd('/off?led='+n); }
function allOn()   { cmd('/on'); }
function allOff()  { cmd('/off'); }
function startSeq(){ cmd('/seq'); }
function stopSeq() { cmd('/seqstop'); }
function updateTimer(v)    { cmd('/set?timer='+v); }
function updateSeqDelay(v) { cmd('/set?seqDelay='+v); }
function poll() {
  fetch('/status').then(r=>r.json()).then(d => {
    [1,2,3].forEach(i => document.getElementById('card'+i).classList.toggle('on', d['led'+i]));
    document.getElementById('sb-mode').textContent = d.seq ? 'SEQUENTIAL' : 'MANUAL';
  });
}
setInterval(poll, 2000);
poll();
── */
</script>
</body>
</html>
